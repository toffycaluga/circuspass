services:
  db:
    image: postgres:16
    container_name: circuspass_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: circuspass_dev
      POSTGRES_USER: circuspass
      POSTGRES_PASSWORD: circuspass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
